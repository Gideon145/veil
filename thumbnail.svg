<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <radialGradient id="glow" cx="35%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#03040a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#03040a" stop-opacity="0"/>
    </radialGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#3b82f6" stroke-width="0.4" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#03040a"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <rect width="1280" height="720" fill="url(#glow)"/>
  <rect width="1280" height="720" fill="url(#glow2)"/>

  <!-- Left accent line -->
  <rect x="80" y="120" width="4" height="480" rx="2" fill="#2563eb" opacity="0.7"/>

  <!-- VEIL diamond logo large -->
  <g transform="translate(116, 220)">
    <rect x="0" y="0" width="100" height="100" rx="18" fill="#1d4ed8" opacity="0.85" transform="rotate(45 50 50)"/>
    <rect x="14" y="14" width="72" height="72" rx="14" fill="#3b82f6" opacity="0.6" transform="rotate(45 50 50)"/>
    <rect x="28" y="28" width="44" height="44" rx="10" fill="#60a5fa" opacity="0.9" transform="rotate(45 50 50)"/>
  </g>

  <!-- VEIL wordmark -->
  <text x="248" y="302" font-family="'Segoe UI', system-ui, sans-serif" font-size="108" font-weight="900" fill="#ffffff" letter-spacing="-4" opacity="0.97">VEIL</text>

  <!-- Tagline -->
  <text x="250" y="360" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="400" fill="#60a5fa" letter-spacing="1">Protocol</text>

  <!-- Divider -->
  <rect x="248" y="382" width="560" height="2" rx="1" fill="#1e40af" opacity="0.5"/>

  <!-- Main headline -->
  <text x="248" y="448" font-family="'Segoe UI', system-ui, sans-serif" font-size="48" font-weight="700" fill="#ffffff">Hedge your crypto.</text>
  <text x="248" y="510" font-family="'Segoe UI', system-ui, sans-serif" font-size="48" font-weight="700" fill="#ffffff">Keep your size</text>
  <text x="248" y="572" font-family="'Segoe UI', system-ui, sans-serif" font-size="52" font-weight="900" fill="#3b82f6">PRIVATE.</text>

  <!-- Right side — lock icon circle -->
  <circle cx="1020" cy="320" r="200" fill="#0f172a" opacity="0.7" stroke="#1e40af" stroke-width="1.5"/>
  <circle cx="1020" cy="320" r="170" fill="none" stroke="#1d4ed8" stroke-width="0.8" opacity="0.4"/>

  <!-- Lock body -->
  <rect x="950" y="310" width="140" height="110" rx="16" fill="#1d4ed8" opacity="0.9"/>
  <!-- Lock shackle -->
  <path d="M 970 310 L 970 270 Q 970 240 1020 240 Q 1070 240 1070 270 L 1070 310" fill="none" stroke="#3b82f6" stroke-width="18" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="1020" cy="355" r="16" fill="#03040a"/>
  <rect x="1013" y="355" width="14" height="28" rx="4" fill="#03040a"/>

  <!-- Encrypted label under lock -->
  <rect x="920" y="464" width="200" height="36" rx="8" fill="#1e3a5f" opacity="0.8"/>
  <text x="1020" y="488" font-family="'Segoe UI Mono', Consolas, monospace" font-size="15" fill="#60a5fa" text-anchor="middle" letter-spacing="1">*** ENCRYPTED</text>

  <!-- Bottom badges -->
  <g transform="translate(248, 618)">
    <!-- iExec badge -->
    <rect x="0" y="0" width="160" height="36" rx="8" fill="#1e3a5f" opacity="0.8"/>
    <text x="80" y="23" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle" font-weight="600">iExec Nox TEE</text>

    <!-- Arbitrum badge -->
    <rect x="172" y="0" width="180" height="36" rx="8" fill="#1e1e3a" opacity="0.8"/>
    <text x="262" y="23" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#a5b4fc" text-anchor="middle" font-weight="600">Arbitrum Sepolia</text>

    <!-- Chainlink badge -->
    <rect x="364" y="0" width="180" height="36" rx="8" fill="#1e2a1e" opacity="0.8"/>
    <text x="454" y="23" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#86efac" text-anchor="middle" font-weight="600">Chainlink Oracle</text>
  </g>

  <!-- iExec challenge label top right -->
  <text x="1200" y="52" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#374151" text-anchor="end" font-weight="500">iExec Vibe Coding Challenge 2026</text>

  <!-- GitHub bottom right -->
  <text x="1200" y="690" font-family="'Segoe UI Mono', Consolas, monospace" font-size="15" fill="#374151" text-anchor="end">github.com/Gideon145/veil</text>
</svg>
